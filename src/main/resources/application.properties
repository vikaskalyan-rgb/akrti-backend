# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/akriti_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:akriti-adeshwar-super-secret-key-2025-minimum-256-bits-long}
jwt.expiration.ms=86400000

# ── Twilio WhatsApp ───────────────────────────────────────
twilio.account.sid=${TWILIO_ACCOUNT_SID:your_account_sid}
twilio.auth.token=${TWILIO_AUTH_TOKEN:your_auth_token}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# ── App Config ────────────────────────────────────────────
app.admin.username=admin
app.admin.password=admin123
app.admin.name=Ramesh Kumar
app.admin.phone=9840000000
app.monthly.maintenance=4200
app.otp.simulate=true

# ── CORS ──────────────────────────────────────────────────
app.cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Scheduler ────────────────────────────────────────────
spring.task.scheduling.enabled=true

spring.datasource.hikari.data-source-properties.sslmode=require
